<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prensa-H5 · Central de Monitoramento</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CABEÇALHO -->
  <header class="ihm-header">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <i class="bi bi-layers-fill header-icon"></i>
        <div>
          <p class="header-sub">SENAI · SUPERVISÓRIO INDUSTRIAL</p>
          <h1 class="header-title">CENTRAL DE MONITORAMENTO — UNIDADE 04</h1>
        </div>
      </div>
      <div class="d-flex flex-column align-items-end gap-1">
        <div id="relogio" class="header-clock"></div>
        <span class="badge-status" id="badgeStatus">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">AGUARDANDO</span>
        </span>
      </div>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <!-- CARD PRINCIPAL -->
        <div class="ihm-card" role="region" aria-label="Painel de pressão hidráulica - Prensa H5">

          <div class="ihm-card-header">
            <span><i class="bi bi-activity me-2"></i>SISTEMA HIDRÁULICO · PRENSA-H5</span>
            <div class="spinner-border spinner-border-sm text-warning d-none" id="spinner" role="status" aria-label="Carregando">
              <span class="visually-hidden">Carregando…</span>
            </div>
          </div>

          <div class="ihm-card-body">

            <!-- Display digital -->
            <div class="pressure-display" id="pressureDisplay" aria-live="polite" aria-atomic="true">
              <p class="pressure-label">PRESSÃO HIDRÁULICA</p>
              <div class="pressure-row">
                <span class="pressure-value" id="pressureValue">--.-</span>
                <span class="pressure-unit">BAR</span>
              </div>
            </div>

            <!-- Barra de progresso -->
            <div class="mt-4">
              <div class="progress-labels d-flex justify-content-between mb-1">
                <span>0</span>
                <span>CRÍTICO &gt; 80 BAR</span>
                <span>100</span>
              </div>
              <div class="progress ihm-progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                     id="progressBar"
                     role="progressbar"
                     style="width:0%"
                     aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
              <div class="critical-zone-marker" aria-hidden="true"></div>
            </div>

            <!-- Alerta de erro -->
            <div class="ihm-alert d-none mt-4" id="alertErro" role="alert" aria-live="assertive">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              <span><strong>FALHA DE COMUNICAÇÃO — </strong><span id="mensagemErro"></span></span>
            </div>

            <!-- Botão -->
            <div class="d-grid mt-4">
              <button class="btn-sync" id="btnSincronizar" onclick="monitorarPressao()">
                <i class="bi bi-broadcast me-2"></i>SINCRONIZAR SENSOR
              </button>
            </div>

          </div>
        </div>

        <!-- LOG -->
        <div class="log-panel mt-4">
          <div class="log-header"><i class="bi bi-terminal me-2"></i>LOG DE EVENTOS</div>
          <ul class="log-list" id="logLista" aria-live="polite">
            <li class="log-item log-info">
              <span class="log-time" id="logInitTime"></span>
              <span>Sistema inicializado. Aguardando sincronização.</span>
            </li>
          </ul>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
